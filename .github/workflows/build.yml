name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swiftc --version

      - name: Build CLI
        run: make

      - name: Build API dumper
        run: make dump-api

      # The binary needs the iPad + private framework to do real work, but it
      # should at least load the framework and print help without a device.
      - name: Smoke test (help / version)
        run: |
          ./sidecar-connect help
          ./sidecar-connect version
